name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=90

      - name: Display coverage summary
        run: pytest tests/ --cov=app --cov-report=term | tail -n 5

  build-docker:
    name: Build and Test Docker
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    env:
      TEST_TAG: localhost:5001/actions/myaction:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Run the Container (dry-run)
        run: |
          docker run \
            --env INPUT_OUTPUT_FILE="output.txt" \
            --env INPUT_DRY_RUN="true" \
            --rm ${{ env.TEST_TAG }}

  test-action:
    name: Action Integration Test
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test Local Action (dry-run)
        id: test-action
        uses: ./
        with:
          output_file: output.txt
          dry_run: 'true'

      - name: Verify Output
        run: |
          if [ -z "${{ steps.test-action.outputs.result }}" ]; then
            echo "FAIL: result output is empty"
            exit 1
          fi
          echo "PASS: action outputs verified"

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-tests
      - build-docker
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
